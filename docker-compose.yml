services:
  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      # cho chắc, trùng với trong yml hiện tại
      SPRING_APPLICATION_NAME: discovery-server

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      - discovery-server
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      # override eureka url (trong container sẽ gọi discovery-server theo tên service)
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka

  auth-service:
    build: ./auth-service
    container_name: auth-service
    depends_on:
      - discovery-server
    environment:
      SPRING_APPLICATION_NAME: auth-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      # dùng MySQL đang chạy trên Windows
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/qlkh?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456

  order-service:
    build: ./order-service
    container_name: order-service
    depends_on:
      - discovery-server
    environment:
      SPRING_APPLICATION_NAME: order-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/qlkh?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    depends_on:
      - discovery-server
    environment:
      SPRING_APPLICATION_NAME: inventory-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/qlkh?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456

  product-service:
    build: ./product-service
    container_name: product-service
    depends_on:
      - discovery-server
    environment:
      SPRING_APPLICATION_NAME: product-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/qlkh?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456

    volumes:
      # map thư mục uploads trên máy thật vào /app/uploads trong container
      - ./product-service/uploads:/app/uploads


  promotion-service:
    build: ./promotion-service
    container_name: promotion-service
    depends_on:
      - discovery-server
    environment:
      SPRING_APPLICATION_NAME: promotion-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/qlkh?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456

  settings-cms-service:
    build: ./settings-cms-service
    container_name: settings-cms-service
    depends_on:
      - discovery-server
    environment:
      SPRING_APPLICATION_NAME: settings-cms-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/qlkh?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456

networks:
  default:
    name: qlkh-network
